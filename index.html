/* ────────────────────────────────────────────────────────
   1. VARIABLES & THEME
──────────────────────────────────────────────────────── */
:root {

  --bg-surface: #18181b;
  --bg-sidebar: #09090a;

  --bg-gutter: #0f0f11;

  --border-subtle: #3f3f46;
  --text-primary: #e4e4e7;
  --text-strong: #f4f4f5;
  --text-hover: #d4d4d8;
  --text-subtle: #c1c1cb;
  --text-secondary: #a1a1aa;

/* ────────────────────────────────────────────────────────

──────────────────────────────────────────────────────── */
* { box-sizing: border-box; }

body {

}

main { flex: 1; display: flex; overflow: hidden; }

.editor-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ────────────────────────────────────────────────────────
   3. HEADER
──────────────────────────────────────────────────────── */
header {

  border-bottom: 1px solid var(--border-color); display: flex;

}

#title-area {

}
#title-label {
  color: var(--text-strong); font-weight: 700; font-size: 1.5rem;
  letter-spacing: -0.5px; padding: 0 4px; line-height: 44px;

}

/* ────────────────────────────────────────────────────────
   4. SIDEBAR & TREE
──────────────────────────────────────────────────────── */
#sidebar {
  width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column; flex-shrink: 0;

#sidebar-right {

}
#sidebar-right.hidden { width: 0; border-right: none; opacity: 0; pointer-events: none; }

#sidebar-header, #sidebar-header-right { padding: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-subtle); border-bottom: 1px solid var(--border-color); }

}

.tree-vline, .tree-tee { bottom: -6px; border-left: 1px solid var(--text-dim); }
.tree-tee::after { content: ''; position: absolute; top: 50%; left: 0; width: 4ch; border-top: 1px solid var(--text-dim); }
.tree-elbow { bottom: 50%; width: 4ch; border-left: 1px solid var(--text-dim); border-bottom: 1px solid var(--text-dim); }

.tree-row.active-dir::after { bottom: 0; }

/* ────────────────────────────────────────────────────────
   5. TABS

.tab .ext-toggle {
  font-size: 10px; font-family: ui-monospace, monospace; color: var(--text-dim);

/* ────────────────────────────────────────────────────────

  flex-shrink: 0; white-space: pre;
}
#gutter.hidden { display: none; }

#textarea {
  flex: 1; width: 100%; min-width: 0; background: transparent; border: none; outline: none;
  color: var(--text-primary); font-family: ui-monospace, monospace; font-size: 14px;
  line-height: 1.6; padding: 12px 16px; resize: none; overflow: auto;

}

──────────────────────────────────────────────────────── */
#tab-settings-wrap { position: relative; flex-shrink: 0; }

.settings-btn {

}
.settings-btn:hover { background: var(--border-color); color: var(--text-primary); }
.settings-btn.active { background: var(--bg-active); color: var(--text-strong); border-color: var(--border-subtle); }
#settings-toggle-ext:not(.active) { text-decoration: line-through; }

/* ── Line width slider – reliable downward triangle thumb (Chrome-first) ── */
#line-width-slider {
    display: flex;
    align-items: center;
    height: 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    padding: 0 8px 0 26px;
    gap: 5px;
}
#line-width-slider.hidden { display: none; }
#line-width-slider input[type="range"] {
    flex: 1;
    height: 5px;
    background: var(--border-color);
    border-radius: 3px;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    accent-color: transparent; /* kills the red default circle */

#line-width-slider input[type="range"]::-webkit-slider-runnable-track {
    background: var(--border-color);
    height: 5px;
    border-radius: 3px;
}

#line-width-slider input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    background: var(--text-secondary);

    background: var(--border-color);

    border-radius: 3px;
}

#line-width-slider input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    background: var(--text-secondary);

// ReactiveState – observable state container
// ────────────────────────────────────────────────────────
class ReactiveState extends EventTarget {
    constructor() {
        super();
        this.currentDirHandle = null;
        this.tabs = [];
        this.currentTabId = null;
        this.expandedFolders = new Set();
        this.activeFilePath = null;
        this.activeDirectoryPath = null;
        this.copiedNode = null;
        return new Proxy(this, {
            get(target, prop) {
                const value = Reflect.get(target, prop);
                return typeof value === 'function' ? value.bind(target) : value;
            },
            set(target, prop, value) {
                if (target[prop] === value) return true;
                target[prop] = value;
                target.dispatchEvent(new CustomEvent(prop + 'Changed'));
                return true;
            }
        });
    }

    mutate(prop, fn) {
        fn(this[prop]);
        this.dispatchEvent(new CustomEvent(prop + 'Changed'));
    }
    notify(prop) {
        this.dispatchEvent(new CustomEvent(prop + 'Changed'));
    }
    getTab(id) { return this.tabs.find(t => t.id === id); }

}
// ────────────────────────────────────────────────────────
// PathUtils – file-path helpers
// ────────────────────────────────────────────────────────
class PathUtils {
    /**
     * Resolves a path relative to a base directory handle.
     * @param {FileSystemDirectoryHandle} base
     * @param {string} pathStr
     */
    async resolve(base, pathStr = '') {
        if (!base) throw new Error('No base handle');
        if (!pathStr || pathStr === '/') {
            return { parent: base, name: base.name, path: '/' };
        }
        const parts = pathStr.split('/').filter(Boolean);
        let parent = base;
        const name = parts[parts.length - 1];
        for (let i = 0; i < parts.length - 1; i++) {
            parent = await parent.getDirectoryHandle(parts[i]);
        }
        return { parent, name, path: pathStr };
    }
}
// ────────────────────────────────────────────────────────
// IndexedDBHelper – static helpers for the shared IDB instance
// ────────────────────────────────────────────────────────
class IndexedDBHelper {
    static #db = null;
    /** Returns the cached IDBDatabase instance (null until open() is called) */
    static get db() { return IndexedDBHelper.#db; }
    /** Opens (or returns the cached) 'FileEditor' IDB database */
    static async open() {
        if (IndexedDBHelper.#db) return IndexedDBHelper.#db;
        return new Promise(resolve => {
            const req = indexedDB.open('FileEditor', 2);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
                if (!db.objectStoreNames.contains('extensions')) db.createObjectStore('extensions');
            };
            req.onsuccess = e => { IndexedDBHelper.#db = e.target.result; resolve(IndexedDBHelper.#db); };
            req.onerror = () => resolve(null);
        });
    }
    static async get(store, key) {
        const db = await IndexedDBHelper.open();
        if (!db) return undefined;
        return new Promise(resolve => {
            const tx = db.transaction(store);
            const req = tx.objectStore(store).get(key);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(undefined);
        });
    }
    static async put(store, key, value) {
        const db = await IndexedDBHelper.open();
        if (!db) return;
        return new Promise(resolve => {
            const tx = db.transaction(store, 'readwrite');
            tx.objectStore(store).put(value, key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => resolve();
        });
    }
    static async delete(store, key) {
        const db = await IndexedDBHelper.open();
        if (!db) return;
        return new Promise(resolve => {
            const tx = db.transaction(store, 'readwrite');
            tx.objectStore(store).delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror = () => resolve();
        });
    }
}

            this.#ui.showToast(`Renamed to ${trimmed}`);
        } catch (err) {
            this.#ui.showToast(this.adapter.formatError('Rename', err), 4000);
        }
        this.#ui.closeContextMenu();
    }
    // ── Move & Copy ───────────────────────────────────────
    async moveEntry(srcPath, destFolderPath = '') {
        const srcNode = this.tree.getNode(srcPath);
        if (!srcNode) return;
        if (srcNode.kind === 'directory' && destFolderPath.startsWith(srcPath + '/')) {
            return this.#ui.showToast('Cannot move folder into itself');
        }
        try {
            const destNode = this.tree.getNode(destFolderPath || '/');
            if (!destNode) return this.#ui.showToast('Destination folder not found');
            if (await this.adapter.existsInDir(destNode, srcNode.name)) {
                return this.#ui.showToast(`"${srcNode.name}" already exists in destination`);
            }
            await this.adapter.moveEntryImpl(srcNode, destNode, this.state.currentDirHandle);
            const newPath = destFolderPath ? `${destFolderPath}/${srcNode.name}` : srcNode.name;
            this.tabs.updateTabPaths(srcNode.path, newPath, srcNode.handle);
            if (destFolderPath) {
                this.state.expandedFolders.add(destFolderPath);
                this.saveExpandedState();
            }
            await this.mutateAndRebuild();
            // Notify tab-related listeners of possible path changes
            this.state.notify('tabs');
            this.#ui.showToast(`Moved "${srcNode.name}"`);
        } catch (e) {
            this.#ui.showToast(this.adapter.formatError('Move', e), 4000);
        }
        this.#ui.closeContextMenu();
    }
    async copyEntry(srcNode, destFolderPath) {
        const destNode = this.tree.getNode(destFolderPath || '/');
        if (!destNode) return this.#ui.showToast('Destination folder not found');
        try {
            if (await this.adapter.existsInDir(destNode, srcNode.name)) {
                return this.#ui.showToast(`"${srcNode.name}" already exists in destination`);
            }
            await this.adapter.copyEntryImpl(srcNode, destNode);
            if (destFolderPath) {
                this.state.expandedFolders.add(destFolderPath);
                this.saveExpandedState();
            }
            await this.mutateAndRebuild();
            // Notify tab-related listeners of possible path changes
            this.state.notify('tabs');
            this.#ui.showToast(`Copied "${srcNode.name}"`);
        } catch (e) {
            this.#ui.showToast(this.adapter.formatError('Copy', e), 4000);
        }
        this.#ui.closeContextMenu();
    }
    async isSameEntry(h1, h2) { return this.adapter.isSameEntry(h1, h2); }
}

// ────────────────────────────────────────────────────────
// DirectoryTreeView – reusable file tree view + DOM rendering
// ────────────────────────────────────────────────────────
class DirectoryTreeView {
    #fileTree = null;
    #nodeByPath = new Map();
    #linkedViews = [];
    #fs = null;
    /** @param {string} containerId @param {ReactiveState} state @param {FileManager} fs @param {string} paneName */
    constructor(containerId, state, fs, paneName = 'left') {
        this.container = document.getElementById(containerId);
        this.state = state;
        this.#fs = fs;
        this.paneName = paneName;
        this.longPressTriggered = false;
        this.rootDirNameEl = null;
        this.sidebarHeaderActionsEl = null;
        this.state.addEventListener('activeFilePathChanged', () => this.highlightActive());
        this.state.addEventListener('activeDirectoryPathChanged', () => this.highlightActive());
    }
    get fs() { return this.#fs; }
    set fs(v) { if (this.#fs === v) return; this.#fs = v; for (const lv of this.#linkedViews) lv.fs = v; }
    linkView(view) { this.#linkedViews.push(view); }
    unlinkView(view) { this.#linkedViews = this.#linkedViews.filter(v => v !== view); }
    get fileTree() { return this.#fileTree; }
    set fileTree(v) { if (this.#fileTree === v) return; this.#fileTree = v; for (const lv of this.#linkedViews) lv.fileTree = v; }

    #renderTree(node, container, guides = [], isLast = true) {
        const isDir = node.kind === 'directory';
        const row = document.createElement('div');
        row.className = `tree-row ${isDir ? 'dir-row' : ''}`;
        row.dataset.path = node.path;

        const prefixEl = document.createElement('span');
        prefixEl.className = 'prefix';
        prefixEl.textContent = ' '.repeat((guides.length + 1) * 5);
        guides.forEach((hasLine, idx) => {
            if (hasLine) {
                const g = document.createElement('span');
                g.className = 'tree-vline';
                g.style.left = (idx * 5 + 0.5) + 'ch';
                prefixEl.appendChild(g);
            }
        });
        if (isDir) {
            const c = document.createElement('span');
            c.className = isLast ? 'tree-elbow' : 'tree-tee';
            c.style.left = (guides.length * 5 + 0.5) + 'ch';
            prefixEl.appendChild(c);
        }
        row.appendChild(prefixEl);
        if (!isDir) {
            const square = document.createElement('span');
            square.className = 'file-square';
            row.appendChild(square);
        }
        const nameEl = document.createElement('span');
        nameEl.className = isDir ? 'name dir' : 'name file-name';
        nameEl.textContent = node.name + (isDir ? '/' : '');
        row.appendChild(nameEl);
        container.appendChild(row);

        if (isDir) {
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'children';
            childrenDiv.style.display = this.state.expandedFolders.has(node.path) ? 'block' : 'none';
            container.appendChild(childrenDiv);

            row.onclick = async (e) => {
                if (this.longPressTriggered) return;
                const wasExpanded = this.state.expandedFolders.has(node.path);
                if (!wasExpanded) {
                    await this.fs.loadChildren(node);
                    childrenDiv.replaceChildren();
                    const kids = node.children || [];
                    const lastDirIdx = kids.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
                    kids.forEach((child, i) => {
                        this.#renderTree(child, childrenDiv, [...guides, !isLast], lastDirIdx < 0 || i >= lastDirIdx);
                    });
                }
                if (wasExpanded) {
                    this.state.mutate('expandedFolders', s => s.delete(node.path));
                    childrenDiv.style.display = 'none';
                } else {
                    this.state.mutate('expandedFolders', s => s.add(node.path));
                    childrenDiv.style.display = 'block';
                }
                this.fs.saveExpandedState();
                this.state.activeDirectoryPath = node.path;
                this.updateHeader();
            };

            row.draggable = true;
            row.addEventListener('dragstart', e => {
                e.dataTransfer.setData('application/x-tree-path', node.path);
                row.classList.add('dragging');
            });
            row.addEventListener('dragend', () => row.classList.remove('dragging'));
            row.addEventListener('dragover', e => {
                if (!e.dataTransfer.types.includes('application/x-tree-path')) return;
                e.preventDefault();
                row.classList.add('drop-target');
            });
            row.addEventListener('dragleave', () => row.classList.remove('drop-target'));
            row.addEventListener('drop', e => {
                e.preventDefault();
                row.classList.remove('drop-target');
                const srcPath = e.dataTransfer.getData('application/x-tree-path');
                if (srcPath && srcPath !== node.path && !node.path.startsWith(srcPath + '/')) {
                    this.fs.moveEntry(srcPath, node.path);
                }
            });

            if (this.state.expandedFolders.has(node.path) && node.children?.length) {
                const kids = node.children;
                const lastDirIdx = kids.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
                kids.forEach((child, i) => {
                    this.#renderTree(child, childrenDiv, [...guides, !isLast], lastDirIdx < 0 || i >= lastDirIdx);
                });
            }
        } else {
            row.onclick = () => { if (!this.longPressTriggered) this.fs.openFileFromNode(node); };
            row.draggable = true;
            row.addEventListener('dragstart', e => {
                e.dataTransfer.setData('application/x-tree-path', node.path);
                row.classList.add('dragging');
            });
            row.addEventListener('dragend', () => row.classList.remove('dragging'));
        }
    }

    render() {
        this.container.replaceChildren();
        if (!this.#fileTree) {
            const msg = document.createElement('div');
            msg.style.cssText = 'padding:20px;color:#52525b;text-align:center;font-size:12px';
            msg.textContent = 'No folder open';
            this.container.appendChild(msg);
            for (const lv of this.#linkedViews) lv.render();
            return;
        }
        const children = this.#fileTree.children || [];
        const lastDirIdx = children.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
        children.forEach((child, i) => {
            this.#renderTree(child, this.container, [], lastDirIdx < 0 || i >= lastDirIdx);
        });
        this.highlightActive();
        for (const lv of this.#linkedViews) lv.render();
    }
    updateHeader() {
        if (!this.#fileTree || !this.state.currentDirHandle) {
            this.rootDirNameEl.textContent = 'Click to open folder';
            this.sidebarHeaderActionsEl.replaceChildren();
            for (const lv of this.#linkedViews) lv.updateHeader();
            return;
        }
        const safeName = this.state.currentDirHandle.name;
        this.rootDirNameEl.textContent = safeName;
        this.sidebarHeaderActionsEl.innerHTML =
            '<span class="directory-clear" id="add-new-item" title="Create new file or folder">+</span>' +
            '<span class="directory-clear" id="refresh-folder" title="Refresh tree">⟳</span>' +
            '<span class="directory-clear" id="clear-folder">⌫</span>';
        for (const lv of this.#linkedViews) lv.updateHeader();
    }
    highlightActive() {
        this.container.querySelectorAll('.tree-row.active,.tree-row.active-dir').forEach(el => el.classList.remove('active','active-dir'));
        if (this.state.activeFilePath) {
            const el = this.container.querySelector(`.tree-row[data-path="${CSS.escape(this.state.activeFilePath)}"]`);
            if (el) el.classList.add('active');
        }
        if (this.state.activeDirectoryPath) {
            const dirEl = this.container.querySelector(`.tree-row[data-path="${CSS.escape(this.state.activeDirectoryPath)}"]`);
            if (dirEl) dirEl.classList.add('active-dir');
        }
    }
    clear() {
        this.#fileTree = null;
        this.#nodeByPath.clear();
        this.container.replaceChildren();
        for (const lv of this.#linkedViews) lv.clear();
    }
}
  
  // ────────────────────────────────────────────────────────
// ExtensionManager – discover, install & render
// ────────────────────────────────────────────────────────
class ExtensionManager {
    extensions = [];
    /** @param {ReactiveState} state @param {FileManager} fs */
    constructor(state, fs) {
        this.state = state;
        this.fs = fs;
        /** @type {UIManager} */ this.ui = null;
    }
    async loadAll() {
        await this.fs.initDB();
        return new Promise(resolve => {
            const tx = this.fs.db.transaction('extensions');
            const store = tx.objectStore('extensions');
            const req = store.getAll();
            const keyReq = store.getAllKeys();
            tx.oncomplete = async () => {
                const handles = req.result;
                const keys = keyReq.result;
                this.extensions = [];
                for (let i = 0; i < handles.length; i++) {
                    try {
                        const handle = handles[i];
                        const perm = await this.fs.queryPermission(handle);
                        if (perm !== 'granted') {
                            try { await handle.requestPermission({ mode: 'read' }); } catch { continue; }
                        }
                        const file = await handle.getFile();
                        const html = await file.text();
                        const meta = this.#parseMeta(html);
                        if (meta) {
                            this.extensions.push({ key: keys[i], name: meta.name, types: meta.types, handle, html });
                        }
                    } catch { }
                }
                resolve();
            };
            tx.onerror = () => resolve();
        });
    }
    async install() {
        try {
            const [fileHandle] = await window.showOpenFilePicker({
                types: [{ description: 'Extension HTML', accept: { 'text/html': ['.html'] } }]
            });
            const file = await fileHandle.getFile();
            if (!file.name.endsWith('-extension.html')) {
                this.ui.showToast('Extension files must be named *-extension.html');
                return;
            }
            const html = await file.text();
            const meta = this.#parseMeta(html);
            if (!meta) {
                this.ui.showToast('Missing extension-name or extension-types meta tags');
                return;
            }
            const existing = this.extensions.find(e => e.name === meta.name);
            if (existing) {
                existing.handle = fileHandle;
                existing.html = html;
                existing.types = meta.types;
            } else {
                this.extensions.push({ key: meta.name, name: meta.name, types: meta.types, handle: fileHandle, html });
            }
            await this.fs.initDB();
            const tx = this.fs.db.transaction('extensions', 'readwrite');
            tx.objectStore('extensions').put(fileHandle, meta.name);
            this.ui.showToast(`Extension "${meta.name}" installed (${meta.types.join(', ')})`);
        } catch (e) {
            if (e.name !== 'AbortError') this.ui.showToast('Extension install cancelled or failed');
        }
    }
    async uninstall(name) {
        this.extensions = this.extensions.filter(e => e.name !== name);
        await this.fs.initDB();
        const tx = this.fs.db.transaction('extensions', 'readwrite');
        tx.objectStore('extensions').delete(name);
        this.ui.showToast(`Extension "${name}" removed`);
    }
    #parseMeta(html) {
        const nameMatch = html.match(/<meta\s+name=["']extension-name["']\s+content=["']([^"']+)["']/i);
        const typesMatch = html.match(/<meta\s+name=["']extension-types["']\s+content=["']([^"']+)["']/i);
        if (!nameMatch || !typesMatch) return null;
        return {
            name: nameMatch[1],
            types: typesMatch[1].split(',').map(t => t.trim().toLowerCase())
        };
    }
    getForFile(filename) {
        const lower = filename.toLowerCase();
        for (const ext of this.extensions) {
            for (const type of ext.types) {
                if (lower.endsWith(type)) return ext;
            }
        }
        return null;
    }
    renderTab(tab) {
        // Cancel stale fallback timers from a previous render
        if (tab._extTimers) tab._extTimers.forEach(t => clearTimeout(t));
        // Always recreate the iframe to guarantee a clean reload
        if (tab.extFrame) { tab.extFrame.remove(); tab.extFrame = null; }
        const iframe = document.createElement('iframe');
        iframe.className = 'ext-frame';
        iframe.sandbox = 'allow-scripts';
        document.querySelector('.editor-wrapper').appendChild(iframe);
        tab.extFrame = iframe;
        iframe.srcdoc = tab.extension.html;
        // Reliable delivery (srcdoc can be async)
        const sendLoadMessage = () => {
            try {
                tab.extFrame.contentWindow.postMessage({
                    type: 'editor:load',
                    content: tab.content || '',
                    filename: tab.name
                }, '*');
            } catch (e) {}
        };
        tab.extFrame.onload = sendLoadMessage;
        tab._extTimers = [
            setTimeout(sendLoadMessage, 60), // fallback
            setTimeout(sendLoadMessage, 180) // extra safety for CDNs
        ];
    }
}

// TabManager – tab creation, switching & closing

class TabManager {

        welcome: { canSave: false, canDirty: false },

        text: { canSave: true, canDirty: true },
        extension: { canSave: true, canDirty: true }
    };
    /** Returns true when a tab of the given type can be marked dirty/modified */
    static canTabBeDirty(type) { return TabManager.#TAB_TYPES[type]?.canDirty ?? false; }
    #nextTabId = 1;
    /** @param {ReactiveState} state @param {FileManager} fs @param {ExtensionManager} extensions */
    constructor(state, fs, extensions) {
        this.state = state;
        this.fs = fs;
        this.extensions = extensions;
        /** @type {UIManager} */ this.ui = null;
        this.textarea = null;
        this.gutter = null;
        this.tabsContainer = null;
    }

        arr.splice(toIdx, 0, arr.splice(fromIdx, 1)[0]);

            id: this.#nextTabId++,

            scrollTop: 0,

            } else {

                tab.type = 'extension';

            }

            this.switchToTab(tab.id);

    #createExtToggle(tab, ext) {

                    await this.extensions.uninstall(ext.name);

        } else {

                    fileHandle = this.fs.adapter.makeFileHandle(st.storageId, st.name);

                        current = await current.getDirectoryHandle(parts[i]);

            }

            const activeTab = this.state.tabs.find(t => t.path === activeTabPath);
            if (activeTab) this.switchToTab(activeTab.id);
        } else if (this.state.tabs.length > 0) {
            this.switchToTab(this.state.tabs[0].id);
        }

            this.#sidebarEl.style.transition = '';
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            localStorage.setItem('sidebarWidth', this.#sidebarEl.offsetWidth + 'px');
        });

        // Sidebar resize (right)
        let sidebarRightResizing = false, sidebarRightResizeStartX = 0, sidebarRightResizeStartW = 0;
        this.#sidebarResizeRightEl.addEventListener('mousedown', e => {
            sidebarRightResizing = true;
            sidebarRightResizeStartX = e.clientX;
            sidebarRightResizeStartW = this.#sidebarRightEl.offsetWidth;
            this.#sidebarRightEl.style.transition = 'none';
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!sidebarRightResizing) return;
            const w = Math.max(150, Math.min(600, sidebarRightResizeStartW + e.clientX - sidebarRightResizeStartX));
            this.#sidebarRightEl.style.width = w + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (!sidebarRightResizing) return;
            sidebarRightResizing = false;
            this.#sidebarRightEl.style.transition = '';
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // Bind per-container tree events for the left pane
        this.#bindTreeContainerEvents(this.#treeContainer, this.tree);

        document.addEventListener('click', e => {
            if (e.target.id === 'add-new-item') { e.stopPropagation(); this.fs.createFromDialog(); return; }
            if (e.target.id === 'clear-folder') { e.stopPropagation(); this.fs.clearSavedFolder(); return; }
            if (e.target.id === 'refresh-folder') {
                e.stopPropagation();
                if (this.state.currentDirHandle) this.fs.mutateAndRebuild();
                return;
            }
            if (!e.target.closest('.context-menu')) this.closeContextMenu();
        });
    }
    #bindTreeContainerEvents(container, treeView) {
        container.addEventListener('click', e => {
            if (!e.target.closest('.tree-row')) this.state.activeDirectoryPath = null;
        });
        container.addEventListener('dragover', e => {
            if (!e.dataTransfer.types.includes('application/x-tree-path')) return;
            if (e.target.closest('.tree-row')) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            container.classList.add('drop-target');
        });
        container.addEventListener('dragleave', () => container.classList.remove('drop-target'));
        container.addEventListener('drop', e => {
            container.classList.remove('drop-target');
            if (e.target.closest('.tree-row')) return;
            e.preventDefault();
            const srcPath = e.dataTransfer.getData('application/x-tree-path');
            if (srcPath) this.fs.moveEntry(srcPath, '');
        });
        container.addEventListener('contextmenu', e => {
            this.#showTreeContextMenu(e, e.target);
        });
        let longPressTimer = null;
        let touchMoved = false;
        container.addEventListener('touchstart', e => {
            treeView.longPressTriggered = false;
            touchMoved = false;
            const touch = e.touches[0];
            const target = e.target;
            longPressTimer = setTimeout(() => {
                treeView.longPressTriggered = true;
                const fakeEvent = { preventDefault() {}, clientX: touch.clientX, clientY: touch.clientY };
                this.#showTreeContextMenu(fakeEvent, target);
            }, 600);
        }, { passive: true });
        container.addEventListener('touchend', e => {
            clearTimeout(longPressTimer);
            if (treeView.longPressTriggered) {
                e.preventDefault();
                return;
            }
            if (!touchMoved) {
                const target = e.target;
                const el = target.closest('.tree-row');
                if (el) {
                    e.preventDefault();
                    el.click();
                }
            }
        });
        container.addEventListener('touchmove', () => { clearTimeout(longPressTimer); touchMoved = true; }, { passive: true });
    }
    bindTabEvents() {
        // Allow dropping a tab past the last tab (append to end)
        this.#tabsContainer.addEventListener('dragover', e => {
            if (!e.dataTransfer.types.includes('text/plain')) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });
        this.#tabsContainer.addEventListener('drop', e => {
            e.preventDefault();
            const draggedId = parseInt(e.dataTransfer.getData('text/plain'), 10);
            if (isNaN(draggedId)) return;
            const fromIdx = this.state.tabs.findIndex(t => t.id === draggedId);
            if (fromIdx === -1) return;
            const movedTab = this.state.tabs[fromIdx];
            this.state.tabs.splice(fromIdx, 1);
            this.state.tabs.push(movedTab);
            this.#tabsContainer.appendChild(movedTab.element);
            this.fs.saveOpenTabs(this.state.currentTabId);
        });
        this.#bindTextarea();
        this.#bindSlider();
    }
    #bindTextarea() {
        this.#textarea.addEventListener('input', () => {
            this.updateLineNumbers();
            if (this.state.currentTabId) {
                const tab = this.state.tabs.find(t => t.id === this.state.currentTabId);
                if (tab) {
                    if (TabManager.canTabBeDirty(tab.type)) {
                        tab.dirty = true;
                        if (tab.element) tab.element.querySelector('.dirty-indicator').style.visibility = 'visible';
                        this.fs.scheduleSave();
                    }
                    this.updateEditorStatus(tab);
                }
            } else if (this.state.currentDirHandle && this.#textarea.value && !this.#creatingUntitled) {
                this.#creatingUntitled = true;
                const typed = this.#textarea.value;
                const cursor = this.#textarea.selectionStart;
                this.fs.createUntitledFile().then(tab => {
                    this.#creatingUntitled = false;
                    if (tab) {
                        this.#textarea.value = typed;
                        tab.content = typed;
                        tab.dirty = true;
                        const ind = tab.element?.querySelector('.dirty-indicator');
                        if (ind) ind.style.visibility = 'visible';
                        this.#textarea.selectionStart = this.#textarea.selectionEnd = cursor;
                        this.fs.scheduleSave();
                        this.updateEditorStatus(tab);
                        this.updateLineNumbers();
                    }
                }).catch(() => { this.#creatingUntitled = false; });
            }
        });
        this.#textarea.addEventListener('paste', () => {
            setTimeout(() => this.updateLineNumbers(), 0);
        });
        this.#textarea.addEventListener('scroll', () => this.#gutter.scrollTop = this.#textarea.scrollTop);
        this.#textarea.addEventListener('keydown', e => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.#textarea.selectionStart;
                const end = this.#textarea.selectionEnd;
                this.#textarea.value = this.#textarea.value.substring(0, start) + '\t' + this.#textarea.value.substring(end);
                this.#textarea.selectionStart = this.#textarea.selectionEnd = start + 1;
                this.#textarea.dispatchEvent(new Event('input'));
            }
        });
    }
    #bindSlider() {
        const slider = document.getElementById('width-slider');
        const valueEl = document.getElementById('width-value');
        const MIN_CHARS = 24;
        const MAX_CHARS = 200;
        const mobileQuery = window.matchMedia('(max-width: 768px)');
        const mapSlider = raw => {
            if (raw >= MAX_CHARS) return MAX_CHARS;
            if (!mobileQuery.matches) return raw;
            /* Exponential curve for mobile: spreads lower char values across most of the slider range */
            const t = (raw - MIN_CHARS) / (MAX_CHARS - MIN_CHARS); /* 0 → ~1 (MAX_CHARS returns early above) */
            return Math.round(MIN_CHARS + (MAX_CHARS - MIN_CHARS) * (t * t));
        };
        slider.addEventListener('input', e => {
            const v = mapSlider(+e.target.value);
            valueEl.textContent = (v >= MAX_CHARS) ? '∞' : `${v} ch`;
            if (v >= MAX_CHARS) {
                this.#textarea.style.maxWidth = 'none';
                this.#textarea.style.minWidth = 'auto';
                this.#textarea.style.whiteSpace = 'pre';
                this.#textarea.style.wordWrap = 'normal';
            } else {
                const chWidth = v + 'ch';
                this.#textarea.style.maxWidth = chWidth;
                this.#textarea.style.minWidth = chWidth; /* forces the wrap to move at every value */
                this.#textarea.style.whiteSpace = 'pre-wrap';
                this.#textarea.style.wordWrap = 'break-word';
            }
        });
        slider.dispatchEvent(new Event('input'));
    }
    #bindSettingsPopover() {
        const settingsBtn = document.getElementById('tab-settings-btn');
        const popover = document.getElementById('tab-settings-popover');
        const positionPopover = () => {
            if (popover.classList.contains('hidden')) return;
            const rect = settingsBtn.getBoundingClientRect();
            popover.style.top = rect.bottom + 'px';
            popover.style.left = rect.left + 'px';
        };
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            popover.classList.toggle('hidden');
            positionPopover();
        });
        window.addEventListener('resize', positionPopover);
        // Close popover when clicking outside
        document.addEventListener('click', (e) => {
            if (!popover.contains(e.target) && !settingsBtn.contains(e.target)) {
                popover.classList.add('hidden');
            }
        });
    }
    bindSettings() {
        this.#bindSettingsPopover();
        // Toggle width slider
        document.getElementById('settings-toggle-slider').addEventListener('click', e => {
            const sliderEl = document.getElementById('line-width-slider');
            const nowHidden = sliderEl.classList.toggle('hidden');
            e.currentTarget.classList.toggle('active', !nowHidden);
            localStorage.setItem('sliderVisible', !nowHidden);
        });
        // Toggle gutter
        document.getElementById('settings-toggle-gutter').addEventListener('click', () => {
            const nowHidden = this.#gutter.classList.toggle('hidden');
            document.getElementById('settings-toggle-gutter').classList.toggle('active', !nowHidden);
            localStorage.setItem('gutterVisible', !nowHidden);
        });
        // Toggle ext-toggle visibility
        document.getElementById('settings-toggle-ext').addEventListener('click', e => {
            const nowHidden = this.#tabsContainer.classList.toggle('hide-ext');
            e.currentTarget.classList.toggle('active', !nowHidden);
            localStorage.setItem('extToggleVisible', !nowHidden);
        });
        // Font size
        const MIN_FONT = 10, MAX_FONT = 24, DEFAULT_FONT_SIZE = 14;
        const applyFontSize = sz => {
            this.#textarea.style.fontSize = sz + 'px';
            this.#gutter.style.fontSize = sz + 'px';
            localStorage.setItem('editorFontSize', sz);
        };
        document.getElementById('settings-font-decrease').addEventListener('click', () => {
            const cur = parseInt(this.#textarea.style.fontSize) || DEFAULT_FONT_SIZE;
            if (cur > MIN_FONT) applyFontSize(cur - 1);
        });
        document.getElementById('settings-font-increase').addEventListener('click', () => {
            const cur = parseInt(this.#textarea.style.fontSize) || DEFAULT_FONT_SIZE;
            if (cur < MAX_FONT) applyFontSize(cur + 1);
        });
        document.getElementById('settings-font-reset').addEventListener('click', () => applyFontSize(DEFAULT_FONT_SIZE));
    }
    // Returns true if permission is already granted, false if user action is needed
    async #revalidatePermission() {
        if (!this.state.currentDirHandle) {
            await this.fs.restoreSession();
            return !!this.state.currentDirHandle;
        }
        let perm = await this.fs.queryPermission(this.state.currentDirHandle);
        if (perm === 'granted') return true;
        // Retry once after a short delay — permissions can be transiently
        // unavailable right after waking from sleep / power-saver mode
        await new Promise(r => setTimeout(r, 1500));
        perm = await this.fs.queryPermission(this.state.currentDirHandle);
        if (perm === 'granted') return true;
        this.showActionToast('Tap to restore folder access', async () => {
            try {
                const result = await this.state.currentDirHandle.requestPermission({ mode: 'readwrite' });
                if (result === 'granted') {
                    await this.#wakeRebuild();
                    this.showToast('Folder access restored ✓');
                } else {
                    this.showToast('Access was not granted');
                }
            } catch {
                this.showToast('Failed to restore access');
            }
        });
        return false;
    }
    // Capture in-memory state to localStorage before the browser suspends the page
    #snapshotState() {
        const activeTab = this.state.getActiveTab();
        if (activeTab && activeTab.type !== 'extension' && this.#textarea) {
            activeTab.content = this.#textarea.value;
            activeTab.scrollTop = this.#textarea.scrollTop;
        }
        if (this.state.currentDirHandle) {
            this.fs.saveOpenTabs(this.state.currentTabId);
        }
        this.fs.flushSave().catch(e => console.warn('Flush during snapshot failed', e));
    }
    // Rebuild tree and restore any missing tabs after wake
    async #wakeRebuild() {
        await this.fs.mutateAndRebuild();
        this.tree.highlightActive();
        // If tabs disappeared (page discarded mid-session), restore from localStorage
        if (!this.state.tabs.length && this.state.currentDirHandle) {
            const restored = await this.tabs.restoreOpenTabs(this.state.currentDirHandle);
            if (restored) this.showToast(`Restored ${restored} tab${restored > 1 ? 's' : ''}`);
            if (!this.state.tabs.length) {
                await this.tabs.createNewTab(null, 'welcome.txt', window.WELCOME, null, 'welcome');
            }
            return;
        }
        // Refresh active non-dirty tab content from disk
        const activeTab = this.state.getActiveTab();
        if (activeTab?.handle && activeTab.type !== 'extension' && !activeTab.dirty) {
            try {
                const file = await activeTab.handle.getFile();
                const content = await file.text();
                activeTab.content = content;
                if (this.state.currentTabId === activeTab.id && this.#textarea) {
                    this.#textarea.value = content;
                    this.updateLineNumbers(true);
                }
            } catch (e) { console.warn('Refresh active tab on wake failed', e); }
        }
    }
    // Centralized wake handler — guards against concurrent calls
    async #wakeRestore() {
        if (this.#wakeRestoring) return;
        this.#wakeRestoring = true;
        try {
            const permOk = await this.#revalidatePermission();
            if (permOk && this.state.currentDirHandle) {
                // Small settle delay — some platforms need a moment after wake
                await new Promise(r => setTimeout(r, 200));
                await this.#wakeRebuild();
            }
            // Verify visual state — ensure textarea shows active tab content
            const activeTab = this.state.getActiveTab();
            if (activeTab && activeTab.type !== 'extension' && this.#textarea) {
                if (this.#textarea.value !== (activeTab.content || '')) {
                    this.#textarea.value = activeTab.content || '';
                    this.updateLineNumbers(true);
                }
            }
        } catch (e) {
            console.warn('Wake restore failed', e);
        } finally {
            this.#wakeRestoring = false;
            this.#lastHiddenAt = 0;
        }
        // Fallback: if app is in a broken state (no tabs but saved data exists),
        // schedule a deferred restoreSession() to recover
        this.#scheduleWakeRetry();
    }
    #scheduleWakeRetry() {
        clearTimeout(this.#wakeRetryTimer);
        if (this.state.tabs.length) return;
        const hasSavedTabs = this.fs.loadOpenTabs().length > 0;
        if (!hasSavedTabs) return;
        this.#wakeRetryTimer = setTimeout(async () => {
            if (this.state.tabs.length) return;
            try {
                await this.fs.restoreSession();
            } catch (e) {
                console.warn('Wake retry restoreSession failed', e);
            }
        }, 3000);
    }
    bindLifecycle() {
        // Restore session when page returns from bfcache (back/forward nav)
        window.addEventListener('pageshow', async (e) => {
            if (!e.persisted) return;
            await this.#wakeRestore();
        });

        // Save state eagerly when browser freezes the page (sleep, tab discard)
        document.addEventListener('freeze', () => {
            this.#lastHiddenAt = Date.now();
            this.#snapshotState();
        });

        // Full restore when browser resumes a frozen page
        document.addEventListener('resume', () => {
            this.#wakeRestore();
        });

        // Save + re-validate when page visibility changes (lock-screen / tab switch / wake)
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState !== 'visible') {
                this.#lastHiddenAt = Date.now();
                this.#snapshotState();
                return;
            }
            await this.#wakeRestore();
        });

        // Fallback wake detection — some platforms do not fire visibilitychange
        // reliably after sleep / power-saver mode.  Only act when enough time
        // has elapsed since the page was last hidden (avoids duplicate work on
        // quick alt-tab / tab-switches).
        window.addEventListener('focus', () => {
            if (this.#lastHiddenAt && Date.now() - this.#lastHiddenAt > 5000) {
                this.#wakeRestore();
            }
        });
        window.addEventListener('resize', () => {
            const wasMobile = this.#isMobile;
            this.#isMobile = window.innerWidth <= 768;
            if (this.#isMobile && !wasMobile) this.#sidebarEl.classList.add('hidden');
        });
        window.addEventListener('message', e => {
            if (!e.data || typeof e.data !== 'object') return;
            const tab = this.state.tabs.find(t => t.type === 'extension' && t.extFrame && t.extFrame.contentWindow === e.source);
            if (!tab) return;
            if (e.data.type === 'extension:save') {
                tab.content = e.data.content;
                tab.dirty = true;
                if (tab.element) tab.element.querySelector('.dirty-indicator').style.visibility = 'visible';
                if (tab.id === this.state.currentTabId) {
                    this.fs.scheduleSave();
                } else {
                    this.fs.saveTab(tab);
                }
            } else if (e.data.type === 'extension:dirty') {
                tab.dirty = true;
                if (tab.element) tab.element.querySelector('.dirty-indicator').style.visibility = 'visible';
            }
        });
        window.addEventListener('beforeunload', e => {
            this.#snapshotState();
            if (this.state.tabs.some(t => t.dirty)) {
                e.preventDefault();
                return e.returnValue = 'Unsaved changes will be lost';
            }
        });
    }
    bindEvents() {
        this.bindKeyboard();
        this.bindTreeEvents();
        this.bindTabEvents();
        this.bindSettings();
        this.bindLifecycle();
    }
}
// ────────────────────────────────────────────────────────
// EditorApp – orchestrator
// ────────────────────────────────────────────────────────
class EditorApp {
    constructor() {
        this.state = new ReactiveState();
        this.pathUtils = new PathUtils();
        // Default to Google Drive backend; keep local FS as fallback
        this.driveFs = new FileManager(this.state, new DriveAdapter());
        this.localFs = new FileManager(this.state, new LocalAdapter(this.pathUtils));
        this.fs = this.driveFs;
        this.tree = new DirectoryTreeView('tree-container', this.state, this.fs, 'left');
        this.extensions = new ExtensionManager(this.state, this.fs);
        this.tabs = new TabManager(this.state, this.fs, this.extensions);
        this.ui = new UIManager(this.state, this.tabs, this.tree, this.fs, this.extensions);
        this.#wireBackend(this.fs);
    }
    #wireBackend(fs) {
        fs.tree = this.tree;
        fs.tabs = this.tabs;
        fs.ui = this.ui;
        this.extensions.ui = this.ui;
        this.tabs.ui = this.ui;
    }
    #setBackend(fs) {
        this.fs = fs;
        this.tree.fs = fs;
        this.tabs.fs = fs;
        this.ui.fs = fs;
        this.extensions.fs = fs;
        this.#wireBackend(fs);
        this.#updateBackendBtn();
    }
    #updateBackendBtn() {
        const btn = document.getElementById('local-folder-btn');
        if (!btn) return;
        const isLocal = this.fs === this.localFs;
        btn.textContent = isLocal ? 'Google Drive' : 'Local Folder';
        btn.title = isLocal ? 'Switch to Google Drive' : 'Switch to Local Folder';
    }
    /**
     * Unified backend switch: tears down current UI state, swaps the fs backend,
     * then re-uses the restoreSession() flow to reconnect and rebuild tabs.
     * @param {FileManager} newFs
     */
    async switchBackend(newFs) {
        const prevFs = this.fs;
        this.#setBackend(newFs);
        // Tear down current visual state (tabs + tree) without touching localStorage
        this.state.tabs.forEach(t => { if (t.element) t.element.remove(); if (t.extFrame) t.extFrame.remove(); });
        this.state.tabs = [];
        this.state.currentTabId = null;
        this.state.currentDirHandle = null;
        this.state.activeDirectoryPath = null;
        this.state.expandedFolders.clear();
        localStorage.removeItem('expandedFolders');
        localStorage.removeItem('openTabs');
        this.tree.clear();
        this.tree.updateHeader();
        try {
            // restoreSession handles: load saved session → build tree → restore tabs → welcome fallback
            await newFs.restoreSession();
        } catch (e) {
            this.#setBackend(prevFs);
            if (!this.state.tabs.length) {
                await this.tabs.createNewTab(null, 'welcome.txt', window.WELCOME, null, 'welcome');
            }
        }
    }
    /** Switches to local File System Access API backend */
    async switchToLocal() { await this.switchBackend(this.localFs); }
    /** Switches to Google Drive backend */
    async switchToDrive() { await this.switchBackend(this.driveFs); }
    async init() { await this.ui.init(); }
}
// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

window.onload = async () => {
    window.editorApp = new EditorApp();
    await window.editorApp.init();
    // Wire backend‑toggle button (Local Folder ↔ Google Drive)
    const localBtn = document.getElementById('local-folder-btn');
    if (localBtn) {
        if (!('showDirectoryPicker' in window)) {
            localBtn.style.display = 'none';
        }
        localBtn.addEventListener('click', () => {
            const app = window.editorApp;
            if (app.fs === app.localFs) {
                app.switchToDrive();
            } else {
                app.switchToLocal();
            }
        });
    }
};
</script>
