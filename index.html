'use strict';
// ────────────────────────────────────────────────────────
// ReactiveState – observable state container
// ────────────────────────────────────────────────────────
class ReactiveState extends EventTarget {
    constructor() {
        super();
        this.currentDirHandle = null;
        this.tabs = [];
        this.currentTabId = null;
        this.expandedFolders = new Set();
        this.activeFilePath = null;
        this.activeDirectoryPath = null;
        this.copiedNode = null;
        return new Proxy(this, {
            get(target, prop) {
                const value = Reflect.get(target, prop);
                return typeof value === 'function' ? value.bind(target) : value;
            },
            set(target, prop, value) {
                if (target[prop] === value) return true;
                target[prop] = value;
                target.dispatchEvent(new CustomEvent(prop + 'Changed'));
                return true;
            }
        });
    }

    mutate(prop, fn) {
        fn(this[prop]);
        this.dispatchEvent(new CustomEvent(prop + 'Changed'));
    }
        notify(prop) {
        this.dispatchEvent(new CustomEvent(prop + 'Changed'));
    }
    getTab(id) { return this.tabs.find(t => t.id === id); }
    getActiveTab() { return this.currentTabId !== null ? this.getTab(this.currentTabId) : null; }
}
// ────────────────────────────────────────────────────────
// PathUtils – file-path helpers
// ────────────────────────────────────────────────────────
class PathUtils {
    /**
     * Resolves a path relative to a base directory handle.
     * @param {FileSystemDirectoryHandle} base
     * @param {string} pathStr
     */
    async resolve(base, pathStr = '') {
        if (!base) throw new Error('No base handle');
        if (!pathStr || pathStr === '/') {
            return { parent: base, name: base.name, path: '/' };
        }
        const parts = pathStr.split('/').filter(Boolean);
        let parent = base;
        const name = parts[parts.length - 1];
        for (let i = 0; i < parts.length - 1; i++) {
            parent = await parent.getDirectoryHandle(parts[i]);
        }
        return { parent, name, path: pathStr };
    }
}
// ────────────────────────────────────────────────────────
// FileSystemManager 
// ────────────────────────────────────────────────────────
class FileSystemManager {
    #INVALID_CHARS = /[<>:"|?*\x00-\x1F]/;
    #saveInProgress = false;
    #restoring = false;
    #restoreStartedAt = 0;
    /** @param {ReactiveState} state @param {PathUtils} pathUtils */
    constructor(state, pathUtils) {

        if (!h1 || !h2) return false;
        return h1.isSameEntry(h2);
    }
}
// ────────────────────────────────────────────────────────
// GoogleDriveManager – Google Drive REST v3 backend
// (replaces FileSystemManager for Drive-first operation)
// ────────────────────────────────────────────────────────
class GoogleDriveManager {
    #INVALID_CHARS = /[<>:"|?*\x00-\x1F]/;
    #saveInProgress = false;
    #restoring = false;
    #restoreStartedAt = 0;
    #accessToken = null;
    #tokenClient = null;
    #tokenExpiresAt = 0;
    #rootFolderId = null;
    // Replace with your own Google Cloud OAuth 2.0 Client ID
    static CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
    static SCOPES = 'https://www.googleapis.com/auth/drive.file';
    static DRIVE_API = 'https://www.googleapis.com/drive/v3';
    static UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';
    static FOLDER_MIME = 'application/vnd.google-apps.folder';
    /** @param {ReactiveState} state @param {PathUtils} pathUtils */
    constructor(state, pathUtils) {
        this.state = state;
        this.pathUtils = pathUtils;
        this.db = null;
        /** @type {TreeManager} */ this.tree = null;
        /** @type {TabManager} */ this.tabs = null;
        /** @type {UIManager} */ this.ui = null;
        this.scheduleSave = (() => {
            let timer;
            return () => {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    if (this.#saveInProgress || !this.state.currentTabId) return;
                    const tab = this.state.getTab(this.state.currentTabId);
                    if (tab?.dirty) this.saveTab(tab);
                }, 750);
            };
        })();
    }

    // ── Drive API helpers ─────────────────────────────────
    /** Ensures a valid access token, refreshing silently if expired */
    async #ensureToken() {
        if (this.#accessToken && Date.now() < this.#tokenExpiresAt - 60000) {
            return this.#accessToken;
        }
        return new Promise((resolve, reject) => {
            if (!this.#tokenClient) {
                this.#initTokenClient();
            }
            this.#tokenClient.callback = (resp) => {
                if (resp.error) {
                    reject(new Error(resp.error));
                    return;
                }
                this.#accessToken = resp.access_token;
                this.#tokenExpiresAt = Date.now() + (resp.expires_in * 1000);
                this.#saveTokenToDB();
                resolve(this.#accessToken);
            };
            this.#tokenClient.requestAccessToken({ prompt: this.#accessToken ? '' : 'consent' });
        });
    }

    #initTokenClient() {
        if (typeof google === 'undefined' || !google.accounts?.oauth2) {
            throw new Error('Google Identity Services not loaded');
        }
        if (GoogleDriveManager.CLIENT_ID.includes('YOUR_CLIENT_ID')) {
            throw new Error('Replace GoogleDriveManager.CLIENT_ID with your OAuth 2.0 Client ID from https://console.cloud.google.com/apis/credentials');
        }
        this.#tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GoogleDriveManager.CLIENT_ID,
            scope: GoogleDriveManager.SCOPES,
            callback: () => {},
        });
    }

    /** Drive API fetch wrapper with auto-retry on 401 */
    async #driveRequest(url, options = {}) {
        const token = await this.#ensureToken();
        const headers = { 'Authorization': `Bearer ${token}`, ...(options.headers || {}) };
        let resp = await fetch(url, { ...options, headers });
        if (resp.status === 401) {
            this.#accessToken = null;
            const newToken = await this.#ensureToken();
            headers['Authorization'] = `Bearer ${newToken}`;
            resp = await fetch(url, { ...options, headers });
        }
        return resp;
    }

    #formatError(action, e) {
        if (e.message?.includes('permission') || e.message?.includes('403')) return `${action} failed: permission denied – reconnect Google account`;
        if (e.message?.includes('quota') || e.message?.includes('429')) return `${action} failed: rate limit exceeded, try again`;
        if (e.message?.includes('404') || e.message?.includes('not found')) return `${action} failed: file/folder not found`;
        return `${action} failed: ${e.message || e}`;
    }

    /** Creates a fake handle object for Drive entries – Drive API equivalent of FileSystemHandle */
    #makeHandle(id, name, kind) {
        const mgr = this;
        const handle = { id, name, kind };
        if (kind === 'directory') {
            handle.getDirectoryHandle = async (childName) => {
                return mgr._findChild(id, childName, 'directory');
            };
            handle.getFileHandle = async (childName, opts) => {
                return mgr._findChild(id, childName, 'file', opts);
            };
        }
        if (kind === 'file') {
            handle.getFile = async () => {
                return mgr._readFile(id, name);
            };
        }
        handle.isSameEntry = (other) => other?.id === id;
        return handle;
    }

    /** Internal: finds a child entry in a Drive folder by name and kind (used by fake handles) */
    async _findChild(parentId, childName, kind, opts) {
        const mimeFilter = kind === 'directory'
            ? `and mimeType='${GoogleDriveManager.FOLDER_MIME}'`
            : `and mimeType!='${GoogleDriveManager.FOLDER_MIME}'`;
        const q = encodeURIComponent(`'${parentId}' in parents and name='${childName.replace(/'/g, "\\'")}' ${mimeFilter} and trashed=false`);
        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=files(id,name)&pageSize=1`);
        if (!resp.ok) throw new DOMException('Not found', 'NotFoundError');
        const data = await resp.json();
        if (!data.files?.length) {
            if (kind === 'file' && opts?.create) {
                return await this.#createDriveFile(childName, parentId, '');
            }
            throw new DOMException('Not found', 'NotFoundError');
        }
        return this.#makeHandle(data.files[0].id, data.files[0].name, kind);
    }

    /** Internal: reads file content from Drive (used by fake handles) */
    async _readFile(fileId, name) {
        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${fileId}?alt=media`);
        if (!resp.ok) throw new Error(`Read failed: ${resp.status}`);
        const text = await resp.text();
        return { text: () => Promise.resolve(text), name };
    }

    // ── DB & persistence ───────────────────────────────────
    /** Drive API equivalent of original FSA method – initializes IndexedDB */
    async initDB() {
        if (this.db) return;
        return new Promise(resolve => {
            const req = indexedDB.open('FileEditor', 2);
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
                if (!db.objectStoreNames.contains('extensions')) db.createObjectStore('extensions');
            };
            req.onsuccess = e => { this.db = e.target.result; resolve(); };
            req.onerror = () => resolve();
        });
    }

    /** Drive API equivalent of original FSA method – always returns 'granted' when token is valid */
    async queryPermission(handle) {
        if (!handle) return 'denied';
        if (this.#accessToken && Date.now() < this.#tokenExpiresAt - 60000) return 'granted';
        try {
            await this.#ensureToken();
            return 'granted';
        } catch { return 'denied'; }
    }

    /** Drive API equivalent of original FSA method – saves root folder ID + token to IndexedDB */
    async saveFolderHandle(handle) {
        await this.initDB();
        const tx = this.db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put({ id: handle.id, name: handle.name, kind: 'directory' }, 'main');
    }

    async #saveTokenToDB() {
        await this.initDB();
        const tx = this.db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put({
            token: this.#accessToken,
            expiresAt: this.#tokenExpiresAt,
        }, 'driveToken');
    }

    async #loadTokenFromDB() {
        await this.initDB();
        return new Promise(resolve => {
            const tx = this.db.transaction('handles');
            const req = tx.objectStore('handles').get('driveToken');
            req.onsuccess = () => {
                const data = req.result;
                if (data?.token && data.expiresAt > Date.now() + 60000) {
                    this.#accessToken = data.token;
                    this.#tokenExpiresAt = data.expiresAt;
                }
                resolve();
            };
            req.onerror = () => resolve();
        });
    }

    /** Drive API equivalent of original FSA method – loads saved Drive root folder */
    async loadSavedFolder() {
        await this.initDB();
        await this.#loadTokenFromDB();
        return new Promise(resolve => {
            const tx = this.db.transaction('handles');
            const req = tx.objectStore('handles').get('main');
            req.onsuccess = async () => {
                const data = req.result;
                if (!data?.id) return resolve({ status: 'none' });
                const handle = this.#makeHandle(data.id, data.name || 'My Drive', 'directory');
                if (this.#accessToken) {
                    try {
                        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/about?fields=user`, {});
                        if (resp.ok) return resolve({ status: 'granted', handle });
                    } catch {}
                }
                resolve({ status: 'needs-auth', handle });
            };
            req.onerror = () => resolve({ status: 'none' });
        });
    }

    /** Drive API equivalent of original FSA method – clears saved Drive connection */
    async clearSavedFolder() {
        if (this.db) {
            const tx = this.db.transaction('handles', 'readwrite');
            tx.objectStore('handles').delete('main');
            tx.objectStore('handles').delete('driveToken');
        }
        this.#accessToken = null;
        this.#tokenExpiresAt = 0;
        this.#rootFolderId = null;
        this.state.currentDirHandle = null;
        this.state.activeDirectoryPath = null;
        this.state.expandedFolders.clear();
        localStorage.removeItem('expandedFolders');
        localStorage.removeItem('openTabs');
        this.tree.clear();
        this.tree.updateHeader();
    }

    // ── Tree & lazy loading ────────────────────────────────
    /** Drive API equivalent of original FSA method – lists children of a Drive folder via files.list */
    async loadChildren(dirNode) {
        if (dirNode.kind !== 'directory' || dirNode.childrenLoaded) return;
        dirNode.children = [];
        try {
            const folderId = dirNode.handle.id;
            const q = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
            const fields = encodeURIComponent('files(id,name,mimeType)');
            let pageToken = '';
            const allEntries = [];
            do {
                const url = `${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=nextPageToken,${fields}&pageSize=1000${pageToken ? '&pageToken=' + pageToken : ''}`;
                const resp = await this.#driveRequest(url);
                if (!resp.ok) throw new Error(`List failed: ${resp.status}`);
                const data = await resp.json();
                for (const f of (data.files || [])) {
                    if (f.name.startsWith('.') || f.name === 'node_modules' || f.name === '__pycache__') continue;
                    const kind = f.mimeType === GoogleDriveManager.FOLDER_MIME ? 'directory' : 'file';
                    allEntries.push({ name: f.name, id: f.id, kind });
                }
                pageToken = data.nextPageToken || '';
            } while (pageToken);

            allEntries.sort((a, b) =>
                (a.kind !== b.kind ? (a.kind === 'directory' ? -1 : 1) : a.name.localeCompare(b.name, undefined, { numeric: true }))
            );

            for (const entry of allEntries) {
                const path = dirNode.path === '/' ? entry.name : `${dirNode.path}/${entry.name}`;
                const handle = this.#makeHandle(entry.id, entry.name, entry.kind);
                const node = entry.kind === 'directory'
                    ? { name: entry.name, kind: 'directory', handle, path, children: [], childrenLoaded: false }
                    : { name: entry.name, kind: 'file', handle, path };
                this.tree.registerNode(path, node);
                dirNode.children.push(node);
            }
        } catch (e) { console.warn('loadChildren failed', e); }
        dirNode.childrenLoaded = true;
    }

    /** Drive API equivalent of original FSA method – builds file tree from Drive root */
    async build(rootHandle) {
        this.tree.clear();
        this.#rootFolderId = rootHandle.id;
        const root = {
            name: rootHandle.name,
            kind: 'directory',
            handle: rootHandle,
            path: '/',
            children: [],
            childrenLoaded: false
        };
        this.tree.registerNode('/', root);
        this.tree.fileTree = root;
        await this.loadChildren(root);
        return root;
    }

    /** Drive API equivalent of original FSA method – rebuilds tree preserving expanded state */
    async mutateAndRebuild() {
        if (!this.state.currentDirHandle) return;
        const perm = await this.queryPermission(this.state.currentDirHandle);
        if (perm !== 'granted') {
            try {
                await this.#ensureToken();
            } catch {
                this.ui.showToast('Reconnect Google account to grant access', 4000);
                return;
            }
        }
        if (this._rebuildInFlight) {
            this._rebuildQueued = true;
            return;
        }
        this._rebuildInFlight = true;
        try {
            do {
                this._rebuildQueued = false;
                const previouslyExpanded = new Set(this.state.expandedFolders);
                await this.build(this.state.currentDirHandle);
                for (const path of [...previouslyExpanded].sort((a, b) => a.split('/').length - b.split('/').length)) {
                    const node = this.tree.getNode(path);
                    if (node?.kind === 'directory') {
                        await this.loadChildren(node);
                        this.state.expandedFolders.add(path);
                    }
                }
                this.tree.render();
                this.tree.updateHeader();
            } while (this._rebuildQueued);
        } finally {
            this._rebuildInFlight = false;
        }
    }

    // ── Expanded tabs persistence ──────────────────────────
    /** Drive API equivalent of original FSA method */
    loadExpandedState() {
        try {
            const saved = localStorage.getItem('expandedFolders');
            if (saved) this.state.expandedFolders = new Set(JSON.parse(saved));
        } catch {}
    }
    /** Drive API equivalent of original FSA method */
    saveExpandedState() {
        try { localStorage.setItem('expandedFolders', JSON.stringify([...this.state.expandedFolders])); } catch {}
    }
    /** Drive API equivalent of original FSA method */
    saveOpenTabs(currentId) {
        try {
            const data = this.state.tabs
                .filter(t => t.path)
                .map(t => ({ path: t.path, name: t.name, type: t.type, active: t.id === currentId, driveId: t.handle?.id }));
            if (data.length || this.state.currentDirHandle) {
                localStorage.setItem('openTabs', JSON.stringify(data));
            }
        } catch {}
    }
    /** Drive API equivalent of original FSA method */
    loadOpenTabs() {
        try {
            const saved = localStorage.getItem('openTabs');
            return saved ? JSON.parse(saved) : [];
        } catch { return []; }
    }

    // ── Session restore ────────────────────────────────────
    /** Drive API equivalent of original FSA method – restores Drive session from IndexedDB */
    async restoreSession() {
        if (this.#restoring && Date.now() - this.#restoreStartedAt < 15000) return;
        this.#restoring = true;
        this.#restoreStartedAt = Date.now();
        try {
            this.loadExpandedState();
            const saved = await this.loadSavedFolder();
            if (saved.status === 'granted') {
                this.state.currentDirHandle = saved.handle;
                await this.build(saved.handle);
                await this.#expandSavedFolders();
                this.tree.render();
                this.tree.updateHeader();
                const restored = await this.tabs.restoreOpenTabs(saved.handle);
                if (restored) this.ui.showToast(`Restored ${restored} tab${restored > 1 ? 's' : ''}`);
            } else if (saved.status === 'needs-auth') {
                this.#handlePendingAuth(saved.handle);
                return;
            }
            if (!this.state.tabs.length) {
                await this.tabs.createNewTab(null, 'welcome.txt', window.WELCOME, null, 'welcome');
            }
        } finally {
            this.#restoring = false;
        }
    }
    async #expandSavedFolders() {
        for (const path of [...this.state.expandedFolders].sort((a, b) => a.split('/').length - b.split('/').length)) {
            const node = this.tree.getNode(path);
            if (node?.kind === 'directory') await this.loadChildren(node);
        }
    }
    #handlePendingAuth(handle) {
        const pendingTabs = this.loadOpenTabs();
        this.ui.showActionToast('Tap to reconnect Google Account', async () => {
            try {
                await this.#ensureToken();
                this.state.currentDirHandle = handle;
                await this.build(handle);
                this.loadExpandedState();
                await this.#expandSavedFolders();
                this.tree.render();
                this.tree.updateHeader();
                const welcomeIdx = this.state.tabs.findIndex(t => t.type === 'welcome');
                if (welcomeIdx !== -1) {
                    this.state.tabs[welcomeIdx].element.remove();
                    this.state.tabs.splice(welcomeIdx, 1);
                }
                const restored = await this.tabs.restoreOpenTabs(handle, pendingTabs);
                if (restored) this.ui.showToast(`Restored ${restored} tab${restored > 1 ? 's' : ''}`);
                else if (!this.state.tabs.length) {
                    await this.tabs.createNewTab(null, 'welcome.txt', window.WELCOME, null, 'welcome');
                }
                this.ui.showToast('Google Drive access restored ✓');
            } catch {
                this.ui.showToast('Failed to restore access');
            }
        }, 15000);
    }

    // ── Connect to Drive (equivalent of openFolder) ───────
    /** Drive API equivalent of original FSA method – connects Google account and sets root to My Drive */
    async openFolder() {
        try {
            await this.#ensureToken();
            // Get the actual root folder ID
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/root?fields=id,name`);
            if (!resp.ok) throw new Error('Failed to access Drive');
            const rootInfo = await resp.json();
            const rootHandle = this.#makeHandle(rootInfo.id, 'My Drive', 'directory');
            this.state.currentDirHandle = rootHandle;
            await this.saveFolderHandle(rootHandle);
            this.state.expandedFolders.clear();
            this.state.activeDirectoryPath = null;
            await this.build(rootHandle);
            this.tree.render();
            this.tree.updateHeader();
            this.ui.showToast('Google Drive connected ✓');
        } catch (e) {
            if (e.message !== 'popup_closed_by_user') {
                this.ui.showToast('Google Drive connection cancelled or failed');
            }
        }
    }

    /** Drive API equivalent of original FSA method – not applicable for Drive, shows toast */
    async openFile() {
        this.ui.showToast('Use the file tree to open files from Google Drive');
    }

    /** Drive API equivalent of original FSA method – reads file content from Drive via files.get with alt=media */
    async openFileFromNode(node) {
        try {
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${node.handle.id}?alt=media`);
            if (!resp.ok) throw new Error(`Read failed: ${resp.status}`);
            const content = await resp.text();
            await this.tabs.createNewTab(node.handle, node.name, content, node.path);
            if (this.ui.isMobile && !this.ui.sidebarEl.classList.contains('hidden')) {
                this.ui.toggleSidebar();
            }
        } catch (e) {
            this.ui.showToast(e.message.includes('permission') || e.message.includes('403')
                ? 'Reconnect Google account to grant access'
                : 'File too large or unreadable as text');
        }
    }

    /** Drive API equivalent of original FSA method – opens Drive file in browser via webViewLink */
    async openInBrowser(node) {
        try {
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${node.handle.id}?fields=webViewLink`);
            if (!resp.ok) throw new Error('Failed to get link');
            const data = await resp.json();
            if (data.webViewLink) {
                window.open(data.webViewLink, '_blank');
            } else {
                // Fallback: download and open as blob
                const dlResp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${node.handle.id}?alt=media`);
                const blob = await dlResp.blob();
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                setTimeout(() => URL.revokeObjectURL(url), 60_000);
            }
        } catch (e) {
            this.ui.showToast('Failed to open file in browser');
        }
    }

    // ── Target directory for new items ─────────────────────
    /** Drive API equivalent of original FSA method – resolves target folder ID for new items */
    async #getTargetDir() {
        const targetPath = this.ui.contextMenuTarget?.kind === 'directory'
            ? this.ui.contextMenuTarget.path
            : (this.state.activeDirectoryPath || '');
        if (!targetPath || targetPath === '/') {
            return { dirId: this.#rootFolderId, targetPath: '' };
        }
        const node = this.tree.getNode(targetPath);
        if (!node) return { dirId: this.#rootFolderId, targetPath: '' };
        return { dirId: node.handle.id, targetPath };
    }

    // ── New file/folder ────────────────────────────────────
    /** Drive API equivalent of original FSA method – creates new file or folder in Drive */
    async #newItem(kind) {
        if (!this.state.currentDirHandle) return this.ui.showToast('Connect Google Account first');
        const isFile = kind === 'file';
        const activePath = this.state.activeDirectoryPath || '';
        const rootName = this.state.currentDirHandle.name;
        const displayPath = '/' + rootName + (activePath ? '/' + activePath : '') + '/';
        const name = await this.ui.showDialog({ promptTitle: isFile ? 'New file name:' : 'New folder name:', subtitle: displayPath });
        if (!name?.trim()) return;
        const trimmed = name.trim();
        if (this.#INVALID_CHARS.test(trimmed) || /[\/\\]/.test(trimmed))
            return this.ui.showToast(isFile ? 'Invalid filename' : 'Invalid folder name');
        const { dirId, targetPath } = await this.#getTargetDir();
        try {
            if (isFile) {
                const handle = await this.#createDriveFile(trimmed, dirId, '');
                if (targetPath) {
                    this.state.expandedFolders.add(targetPath);
                    this.saveExpandedState();
                }
                await this.mutateAndRebuild();
                await this.tabs.createNewTab(handle, trimmed, '', targetPath ? `${targetPath}/${trimmed}` : trimmed);
            } else {
                await this.#createDriveFolder(trimmed, dirId);
                if (targetPath) {
                    this.state.expandedFolders.add(targetPath);
                    this.saveExpandedState();
                }
                await this.mutateAndRebuild();
                this.ui.showToast('Folder created');
            }
        } catch (e) {
            this.ui.showToast(this.#formatError(isFile ? 'Create file' : 'Create folder', e));
        }
        this.ui.closeContextMenu();
    }

    /** Creates a file in Drive – Drive API equivalent of getFileHandle(name, {create:true}) + write */
    async #createDriveFile(name, parentId, content = '') {
        const metadata = { name, parents: [parentId] };
        const boundary = '---drive-boundary-' + Date.now();
        const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: text/plain\r\n\r\n${content}\r\n--${boundary}--`;
        const resp = await this.#driveRequest(`${GoogleDriveManager.UPLOAD_API}/files?uploadType=multipart&fields=id,name`, {
            method: 'POST',
            headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
            body,
        });
        if (!resp.ok) throw new Error(`Create file failed: ${resp.status}`);
        const data = await resp.json();
        return this.#makeHandle(data.id, data.name, 'file');
    }

    /** Creates a folder in Drive – Drive API equivalent of getDirectoryHandle(name, {create:true}) */
    async #createDriveFolder(name, parentId) {
        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, mimeType: GoogleDriveManager.FOLDER_MIME, parents: [parentId] }),
        });
        if (!resp.ok) throw new Error(`Create folder failed: ${resp.status}`);
        const data = await resp.json();
        return this.#makeHandle(data.id, data.name, 'directory');
    }

    /** Drive API equivalent of original FSA method */
    async newFile() { return this.#newItem('file'); }
    /** Drive API equivalent of original FSA method */
    async newFolder() { return this.#newItem('folder'); }

    /** Drive API equivalent of original FSA method – creates untitled file in Drive root */
    async createUntitledFile() {
        if (!this.state.currentDirHandle) return null;
        let name = 'new.txt';
        let counter = 0;
        // Check for existing files with the same name
        const q = encodeURIComponent(`'${this.#rootFolderId}' in parents and trashed=false`);
        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=files(name)&pageSize=1000`);
        const existingNames = new Set();
        if (resp.ok) {
            const data = await resp.json();
            for (const f of (data.files || [])) existingNames.add(f.name);
        }
        while (existingNames.has(name)) {
            counter++;
            name = `new_${counter}.txt`;
        }
        const handle = await this.#createDriveFile(name, this.#rootFolderId, '');
        await this.mutateAndRebuild();
        return this.tabs.createNewTab(handle, name, '', name);
    }

    // ── Save ───────────────────────────────────────────────
    /** Drive API equivalent of original FSA method – updates file content in Drive via multipart PATCH */
    async saveTab(tab) {
        if (!tab?.handle || !tab.dirty) return;
        try {
            const content = (this.state.currentTabId === tab.id && tab.type !== 'extension')
                ? this.ui.textarea.value
                : tab.content;
            await this.#updateDriveFile(tab.handle.id, content);
            tab.content = content;
            tab.dirty = false;
            if (tab.element) tab.element.querySelector('.dirty-indicator').style.visibility = 'hidden';
            this.ui.updateEditorStatus(tab);
            this.ui.showToast('Saved', 1200);
        } catch (err) {
            this.ui.showToast(err.message.includes('403') ? 'Reconnect Google account' : 'Save failed');
        }
    }

    /** Updates file content in Drive – Drive API equivalent of createWritable + write + close */
    async #updateDriveFile(fileId, content) {
        const boundary = '---drive-boundary-' + Date.now();
        const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n{}\r\n--${boundary}\r\nContent-Type: text/plain\r\n\r\n${content}\r\n--${boundary}--`;
        const resp = await this.#driveRequest(`${GoogleDriveManager.UPLOAD_API}/files/${fileId}?uploadType=multipart`, {
            method: 'PATCH',
            headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
            body,
        });
        if (!resp.ok) throw new Error(`Save failed: ${resp.status}`);
    }

    /** Drive API equivalent of original FSA method */
    saveCurrentFile() {
        const tab = this.state.getActiveTab();
        if (tab) this.saveTab(tab);
    }
    /** Drive API equivalent of original FSA method */
    async flushSave() {
        if (this.#saveInProgress) return;
        this.#saveInProgress = true;
        try {
            await Promise.allSettled(this.state.tabs.filter(t => t.dirty).map(t => this.saveTab(t)));
        } finally {
            this.#saveInProgress = false;
        }
    }

    // ── Delete ─────────────────────────────────────────────
    /** Drive API equivalent of original FSA method – deletes file via Drive files.delete */
    async deleteFile() {
        const target = this.ui.contextMenuTarget;
        if (!target || target.kind !== 'file') return;
        if (!await this.ui.showDialog({ isConfirm: true, confirmMessage: `Delete "${target.name}"?`, danger: true })) {
            this.ui.closeContextMenu(); return;
        }
        try {
            for (const tab of this.state.tabs) {
                if (tab.handle && await this.isSameEntry(tab.handle, target.handle)) {
                    await this.tabs.closeTab(tab.id);
                    break;
                }
            }
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${target.handle.id}`, { method: 'DELETE' });
            if (!resp.ok && resp.status !== 204) throw new Error(`Delete failed: ${resp.status}`);
            await this.mutateAndRebuild();
            this.ui.showToast('File deleted');
        } catch {
            this.ui.showToast('Delete failed');
        }
        this.ui.closeContextMenu();
    }

    /** Drive API equivalent of original FSA method – deletes folder via Drive files.delete */
    async deleteFolder() {
        const target = this.ui.contextMenuTarget;
        if (!target || target.kind !== 'directory') return;
        const isNonEmpty = target.children?.length > 0;
        const confirmed = isNonEmpty
            ? (await this.ui.showDialog({ promptTitle: `Type "remove" to delete non-empty folder "${target.name}":` }) || '').trim().toLowerCase() === 'remove'
            : await this.ui.showDialog({ isConfirm: true, confirmMessage: `Delete folder "${target.name}"?`, danger: true });
        if (!confirmed) { this.ui.closeContextMenu(); return; }
        try {
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${target.handle.id}`, { method: 'DELETE' });
            if (!resp.ok && resp.status !== 204) throw new Error(`Delete failed: ${resp.status}`);
            this.state.expandedFolders.delete(target.path);
            this.saveExpandedState();
            await this.mutateAndRebuild();
            this.ui.showToast('Folder deleted');
        } catch {
            this.ui.showToast('Delete failed');
        }
        this.ui.closeContextMenu();
    }

    // ── Rename ─────────────────────────────────────────────
    /** Drive API equivalent of original FSA method – renames file/folder via Drive files.update */
    async renameItem() {
        const target = this.ui.contextMenuTarget;
        if (!target) return;
        const newName = await this.ui.showDialog({
            promptTitle: `Rename ${target.kind}:`,
            defaultValue: target.name
        });
        if (!newName?.trim() || newName === target.name) { this.ui.closeContextMenu(); return; }
        const trimmed = newName.trim();
        if (this.#INVALID_CHARS.test(trimmed) || /[\/\\]/.test(trimmed)) {
            this.ui.showToast('Invalid name'); this.ui.closeContextMenu(); return;
        }
        try {
            const oldPath = target.path;
            const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${target.handle.id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: trimmed }),
            });
            if (!resp.ok) throw new Error(`Rename failed: ${resp.status}`);
            const data = await resp.json();
            const updatedHandle = this.#makeHandle(data.id, data.name, target.kind);
            const newPath = oldPath.replace(/[^/]+$/, trimmed);
            this.tabs.updateTabPaths(oldPath, newPath, updatedHandle, trimmed);
            await this.mutateAndRebuild();
            this.state.notify('tabs');
            this.ui.showToast(`Renamed to ${trimmed}`);
        } catch (err) {
            this.ui.showToast(this.#formatError('Rename', err), 4000);
        }
        this.ui.closeContextMenu();
    }

    // ── Move & Copy ────────────────────────────────────────
    /** Drive API equivalent of original FSA method – moves file/folder via Drive files.update with addParents/removeParents */
    async moveEntry(srcPath, destFolderPath = '') {
        const srcNode = this.tree.getNode(srcPath);
        if (!srcNode) return;
        if (srcNode.kind === 'directory' && destFolderPath.startsWith(srcPath + '/')) {
            return this.ui.showToast('Cannot move folder into itself');
        }
        try {
            const destNode = this.tree.getNode(destFolderPath || '/');
            if (!destNode) return this.ui.showToast('Destination folder not found');

            // Check if entry with same name exists in destination
            const q = encodeURIComponent(`'${destNode.handle.id}' in parents and name='${srcNode.name.replace(/'/g, "\\'")}' and trashed=false`);
            const checkResp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=files(id)&pageSize=1`);
            if (checkResp.ok) {
                const checkData = await checkResp.json();
                if (checkData.files?.length > 0) {
                    return this.ui.showToast(`"${srcNode.name}" already exists in destination`);
                }
            }

            // Get current parents to remove
            const parentResp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${srcNode.handle.id}?fields=parents`);
            if (!parentResp.ok) throw new Error(`Move failed: ${parentResp.status}`);
            const parentData = await parentResp.json();
            const previousParents = (parentData.parents || []).join(',');

            const resp = await this.#driveRequest(
                `${GoogleDriveManager.DRIVE_API}/files/${srcNode.handle.id}?addParents=${destNode.handle.id}&removeParents=${previousParents}`,
                { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: '{}' }
            );
            if (!resp.ok) throw new Error(`Move failed: ${resp.status}`);

            const newPath = destFolderPath ? `${destFolderPath}/${srcNode.name}` : srcNode.name;
            this.tabs.updateTabPaths(srcNode.path, newPath, srcNode.handle);

            if (destFolderPath) {
                this.state.expandedFolders.add(destFolderPath);
                this.saveExpandedState();
            }
            await this.mutateAndRebuild();
            this.state.notify('tabs');
            this.ui.showToast(`Moved "${srcNode.name}"`);
        } catch (e) {
            this.ui.showToast(this.#formatError('Move', e), 4000);
        }
        this.ui.closeContextMenu();
    }

    /** Drive API equivalent of original FSA method – copies file/folder via Drive files.copy */
    async copyEntry(srcNode, destFolderPath) {
        const destNode = this.tree.getNode(destFolderPath || '/');
        if (!destNode) return this.ui.showToast('Destination folder not found');
        try {
            // Check if entry with same name exists
            const q = encodeURIComponent(`'${destNode.handle.id}' in parents and name='${srcNode.name.replace(/'/g, "\\'")}' and trashed=false`);
            const checkResp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=files(id)&pageSize=1`);
            if (checkResp.ok) {
                const checkData = await checkResp.json();
                if (checkData.files?.length > 0) {
                    return this.ui.showToast(`"${srcNode.name}" already exists in destination`);
                }
            }

            if (srcNode.kind === 'file') {
                const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${srcNode.handle.id}/copy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: srcNode.name, parents: [destNode.handle.id] }),
                });
                if (!resp.ok) throw new Error(`Copy failed: ${resp.status}`);
            } else {
                await this.#copyDriveDirectory(srcNode.handle.id, destNode.handle.id, srcNode.name);
            }
            if (destFolderPath) {
                this.state.expandedFolders.add(destFolderPath);
                this.saveExpandedState();
            }
            await this.mutateAndRebuild();
            this.state.notify('tabs');
            this.ui.showToast(`Copied "${srcNode.name}"`);
        } catch (e) {
            this.ui.showToast(this.#formatError('Copy', e), 4000);
        }
        this.ui.closeContextMenu();
    }

    static #MAX_COPY_DEPTH = 100;
    /** Recursively copies a Drive directory – Drive API equivalent of original #copyDirectory */
    async #copyDriveDirectory(srcDirId, destParentId, name, depth = 0) {
        if (depth >= GoogleDriveManager.#MAX_COPY_DEPTH) {
            throw new Error(`Directory nesting too deep (>${GoogleDriveManager.#MAX_COPY_DEPTH} levels)`);
        }
        // Create destination folder
        const newFolder = await this.#createDriveFolder(name, destParentId);
        // List source folder contents
        const q = encodeURIComponent(`'${srcDirId}' in parents and trashed=false`);
        const resp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files?q=${q}&fields=files(id,name,mimeType)&pageSize=1000`);
        if (!resp.ok) throw new Error(`List failed: ${resp.status}`);
        const data = await resp.json();
        for (const entry of (data.files || [])) {
            if (entry.mimeType === GoogleDriveManager.FOLDER_MIME) {
                await this.#copyDriveDirectory(entry.id, newFolder.id, entry.name, depth + 1);
            } else {
                const copyResp = await this.#driveRequest(`${GoogleDriveManager.DRIVE_API}/files/${entry.id}/copy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: entry.name, parents: [newFolder.id] }),
                });
                if (!copyResp.ok) throw new Error(`Copy file failed: ${copyResp.status}`);
            }
        }
    }

    /** Drive API equivalent of original FSA method – compares Drive file IDs */
    async isSameEntry(h1, h2) {
        if (!h1 || !h2) return false;
        return h1.id === h2.id;
    }
}

// TreeManager – file tree data + DOM rendering (TREE.html structure + Unicode magic)
// ────────────────────────────────────────────────────────
class TreeManager {
    #fileTree = null;
    #nodeByPath = new Map();
    /** @param {ReactiveState} state @param {FileSystemManager} fs */
    constructor(state, fs) {
        this.state = state;
        this.fs = fs;
        this.longPressTriggered = false;
        this.treeContainer = null;
        this.rootDirNameEl = null;
        this.sidebarHeaderActionsEl = null;
        this.state.addEventListener('activeFilePathChanged', () => this.highlightActive());
        this.state.addEventListener('activeDirectoryPathChanged', () => this.highlightActive());
    }
    get fileTree() { return this.#fileTree; }
    set fileTree(v) { this.#fileTree = v; }
    getNode(path) { return this.#nodeByPath.get(path); }
    registerNode(path, node) { this.#nodeByPath.set(path, node); }

    #renderTree(node, container, guides = [], isLast = true) {
        const isDir = node.kind === 'directory';
        const row = document.createElement('div');
        row.className = `tree-row ${isDir ? 'dir-row' : ''}`;
        row.dataset.path = node.path;

        // Tree guide lines
        // ─────────────────────────────────────────────────
        // `guides` is a boolean array — one entry per ancestor level.
        // true = that ancestor still has siblings below, so draw a vertical line.
        // false = ancestor was the last child, so leave the column blank.
        // The prefix span is position:relative with whitespace for width;
        // child spans (.tree-vline / .tree-tee / .tree-elbow) are absolutely
        // positioned at the correct `ch` offset to draw the connectors.
        const prefixEl = document.createElement('span');
        prefixEl.className = 'prefix';
        prefixEl.textContent = ' '.repeat((guides.length + 1) * 5);
        // Draw CSS guide lines for parent levels
        guides.forEach((hasLine, idx) => {
            if (hasLine) {
                const g = document.createElement('span');
                g.className = 'tree-vline';
                g.style.left = (idx * 5 + 0.5) + 'ch';
                prefixEl.appendChild(g);
            }
        });
        // Draw connector for current node (directories only)
        if (isDir) {
            const c = document.createElement('span');
            c.className = isLast ? 'tree-elbow' : 'tree-tee';
            c.style.left = (guides.length * 5 + 0.5) + 'ch';
            prefixEl.appendChild(c);
        }
        row.appendChild(prefixEl);

        if (!isDir) {
            const square = document.createElement('span');
            square.className = 'file-square';
            row.appendChild(square);
        }

        const nameEl = document.createElement('span');
        nameEl.className = isDir ? 'name dir' : 'name file-name';
        nameEl.textContent = node.name + (isDir ? '/' : '');
        row.appendChild(nameEl);

        container.appendChild(row);

        if (isDir) {
            const childrenDiv = document.createElement('div');
            childrenDiv.className = 'children';
            childrenDiv.style.display = this.state.expandedFolders.has(node.path) ? 'block' : 'none';
            container.appendChild(childrenDiv);

            row.onclick = async (e) => {
                if (this.longPressTriggered) return;
                const wasExpanded = this.state.expandedFolders.has(node.path);
                if (!wasExpanded) {
                    await this.fs.loadChildren(node);
                    childrenDiv.replaceChildren();
                    const kids = node.children || [];
                    const lastDirIdx = kids.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
                    kids.forEach((child, i) => {
                        this.#renderTree(child, childrenDiv, [...guides, !isLast], lastDirIdx < 0 || i >= lastDirIdx);
                    });
                }
                if (wasExpanded) {
                    this.state.mutate('expandedFolders', s => s.delete(node.path));
                    childrenDiv.style.display = 'none';
                } else {
                    this.state.mutate('expandedFolders', s => s.add(node.path));
                    childrenDiv.style.display = 'block';
                }
                this.fs.saveExpandedState();
                this.state.activeDirectoryPath = node.path;
                this.updateHeader();
            };

            row.draggable = true;
            row.addEventListener('dragstart', e => {
                e.dataTransfer.setData('application/x-tree-path', node.path);
                row.classList.add('dragging');
            });
            row.addEventListener('dragend', () => row.classList.remove('dragging'));
            row.addEventListener('dragover', e => {
                if (!e.dataTransfer.types.includes('application/x-tree-path')) return;
                e.preventDefault();
                row.classList.add('drop-target');
            });
            row.addEventListener('dragleave', () => row.classList.remove('drop-target'));
            row.addEventListener('drop', e => {
                e.preventDefault();
                row.classList.remove('drop-target');
                const srcPath = e.dataTransfer.getData('application/x-tree-path');
                if (srcPath && srcPath !== node.path && !node.path.startsWith(srcPath + '/')) {
                    this.fs.moveEntry(srcPath, node.path);
                }
            });

            if (this.state.expandedFolders.has(node.path) && node.children?.length) {
                const kids = node.children;
                const lastDirIdx = kids.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
                kids.forEach((child, i) => {
                    this.#renderTree(child, childrenDiv, [...guides, !isLast], lastDirIdx < 0 || i >= lastDirIdx);
                });
            }
        } else {
            row.onclick = () => { if (!this.longPressTriggered) this.fs.openFileFromNode(node); };
            row.draggable = true;
            row.addEventListener('dragstart', e => {
                e.dataTransfer.setData('application/x-tree-path', node.path);
                row.classList.add('dragging');
            });
            row.addEventListener('dragend', () => row.classList.remove('dragging'));
        }
    }

    render() {
        this.treeContainer.replaceChildren();
        if (!this.#fileTree) {
            const msg = document.createElement('div');
            msg.style.cssText = 'padding:20px;color:#52525b;text-align:center;font-size:12px';
            msg.textContent = 'No folder open';
            this.treeContainer.appendChild(msg);
            return;
        }
        const children = this.#fileTree.children || [];
        const lastDirIdx = children.reduce((acc, c, i) => c.kind === 'directory' ? i : acc, -1);
        children.forEach((child, i) => {
            this.#renderTree(child, this.treeContainer, [], lastDirIdx < 0 || i >= lastDirIdx);
        });
        this.highlightActive();
    }
    updateHeader() {
        if (!this.#fileTree || !this.state.currentDirHandle) {
            this.rootDirNameEl.textContent = 'Click to open folder';
            this.sidebarHeaderActionsEl.replaceChildren();
            return;
        }
        const safeName = this.state.currentDirHandle.name;
        this.rootDirNameEl.textContent = safeName;
        this.sidebarHeaderActionsEl.innerHTML =
            '<span class="directory-clear" id="refresh-folder" title="Refresh tree">⟳</span>' +
            '<span class="directory-clear" id="clear-folder">⌫</span>';
    }
    highlightActive() {
        this.treeContainer.querySelectorAll('.tree-row.active,.tree-row.active-dir').forEach(el => el.classList.remove('active','active-dir'));
        if (this.state.activeFilePath) {
            const el = this.treeContainer.querySelector(`.tree-row[data-path="${CSS.escape(this.state.activeFilePath)}"]`);
            if (el) el.classList.add('active');
        }
        if (this.state.activeDirectoryPath) {
            const dirEl = this.treeContainer.querySelector(`.tree-row[data-path="${CSS.escape(this.state.activeDirectoryPath)}"]`);
            if (dirEl) dirEl.classList.add('active-dir');
        }
    }
    clear() {
        this.#fileTree = null;
        this.#nodeByPath.clear();
        this.treeContainer.replaceChildren();
    }
}

// ExtensionManager – discover, install & render
// ────────────────────────────────────────────────────────
class ExtensionManager {
    extensions = [];
    /** @param {ReactiveState} state @param {FileSystemManager} fs */
    constructor(state, fs) {
        this.state = state;
        this.fs = fs;
        /** @type {UIManager} */ this.ui = null;
    }
    async loadAll() {
        await this.fs.initDB();
        return new Promise(resolve => {
            const tx = this.fs.db.transaction('extensions');
            const store = tx.objectStore('extensions');
            const req = store.getAll();
            const keyReq = store.getAllKeys();
            tx.oncomplete = async () => {
                const handles = req.result;
                const keys = keyReq.result;
                this.extensions = [];
                for (let i = 0; i < handles.length; i++) {
                    try {
                        const handle = handles[i];
                        const perm = await this.fs.queryPermission(handle);
                        if (perm !== 'granted') {
                            try { await handle.requestPermission({ mode: 'read' }); } catch { continue; }
                        }
                        const file = await handle.getFile();
                        const html = await file.text();
                        const meta = this.#parseMeta(html);
                        if (meta) {
                            this.extensions.push({ key: keys[i], name: meta.name, types: meta.types, handle, html });
                        }
                    } catch { }
                }
                resolve();
            };
            tx.onerror = () => resolve();
        });
    }
    async install() {
        try {
            const [fileHandle] = await window.showOpenFilePicker({
                types: [{ description: 'Extension HTML', accept: { 'text/html': ['.html'] } }]
            });
            const file = await fileHandle.getFile();
            if (!file.name.endsWith('-extension.html')) {
                this.ui.showToast('Extension files must be named *-extension.html');
                return;
            }
            const html = await file.text();
            const meta = this.#parseMeta(html);
            if (!meta) {
                this.ui.showToast('Missing extension-name or extension-types meta tags');
                return;
            }
            const existing = this.extensions.find(e => e.name === meta.name);
            if (existing) {
                existing.handle = fileHandle;
                existing.html = html;
                existing.types = meta.types;
            } else {
                this.extensions.push({ key: meta.name, name: meta.name, types: meta.types, handle: fileHandle, html });
            }
            await this.fs.initDB();
            const tx = this.fs.db.transaction('extensions', 'readwrite');
            tx.objectStore('extensions').put(fileHandle, meta.name);
            this.ui.showToast(`Extension "${meta.name}" installed (${meta.types.join(', ')})`);
        } catch (e) {
            if (e.name !== 'AbortError') this.ui.showToast('Extension install cancelled or failed');
        }
    }
    async uninstall(name) {
        this.extensions = this.extensions.filter(e => e.name !== name);
        await this.fs.initDB();
        const tx = this.fs.db.transaction('extensions', 'readwrite');
        tx.objectStore('extensions').delete(name);
        this.ui.showToast(`Extension "${name}" removed`);
    }
    #parseMeta(html) {
        const nameMatch = html.match(/<meta\s+name=["']extension-name["']\s+content=["']([^"']+)["']/i);
        const typesMatch = html.match(/<meta\s+name=["']extension-types["']\s+content=["']([^"']+)["']/i);
        if (!nameMatch || !typesMatch) return null;
        return {
            name: nameMatch[1],
            types: typesMatch[1].split(',').map(t => t.trim().toLowerCase())
        };
    }
    getForFile(filename) {
        const lower = filename.toLowerCase();
        for (const ext of this.extensions) {
            for (const type of ext.types) {
                if (lower.endsWith(type)) return ext;
            }
        }
        return null;
    }
    renderTab(tab) {
        // Cancel stale fallback timers from a previous render
        if (tab._extTimers) tab._extTimers.forEach(t => clearTimeout(t));
        // Always recreate the iframe to guarantee a clean reload
        if (tab.extFrame) { tab.extFrame.remove(); tab.extFrame = null; }
        const iframe = document.createElement('iframe');
        iframe.className = 'ext-frame';
        iframe.sandbox = 'allow-scripts';
        document.querySelector('.editor-wrapper').appendChild(iframe);
        tab.extFrame = iframe;
        iframe.srcdoc = tab.extension.html;
        // Reliable delivery (srcdoc can be async)
        const sendLoadMessage = () => {
            try {
                tab.extFrame.contentWindow.postMessage({
                    type: 'editor:load',
                    content: tab.content || '',
                    filename: tab.name
                }, '*');
            } catch (e) {}
        };
        tab.extFrame.onload = sendLoadMessage;
        tab._extTimers = [
            setTimeout(sendLoadMessage, 60), // fallback
            setTimeout(sendLoadMessage, 180) // extra safety for CDNs
        ];
    }
}

// TabManager – tab creation, switching & closing

class TabManager {
    static #TAB_TYPES = {
        welcome: { canSave: false, canDirty: false },
        legend: { canSave: false, canDirty: false },
        text: { canSave: true, canDirty: true },
        extension: { canSave: true, canDirty: true }
    };
    /** Returns true when a tab of the given type can be marked dirty/modified */
    static canTabBeDirty(type) { return TabManager.#TAB_TYPES[type]?.canDirty ?? false; }
    #nextTabId = 1;
    /** @param {ReactiveState} state @param {FileSystemManager} fs @param {ExtensionManager} extensions */
    constructor(state, fs, extensions) {
        this.state = state;
        this.fs = fs;
        this.extensions = extensions;
        /** @type {UIManager} */ this.ui = null;
        this.textarea = null;
        this.gutter = null;
        this.tabsContainer = null;
    }
    static #moveArrayItem(arr, fromIdx, toIdx) {
